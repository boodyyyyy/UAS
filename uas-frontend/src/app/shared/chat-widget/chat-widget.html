<div class="chat-widget">
  @if (isOpen) {
    <div class="chat-window">
      <div class="chat-header">
        <h3>AI Assistant</h3>
        <button class="close-btn" (click)="toggleChat()">×</button>
      </div>
      <div class="chat-messages">
        @for (message of messages; track message.timestamp) {
          <div class="message" [ngClass]="'message-' + message.sender">
            <div class="message-content">
              {{ message.text }}
            </div>
            <div class="message-time">
              {{ message.timestamp | date:'shortTime' }}
            </div>
          </div>
        }
        @if (isLoading) {
          <div class="message message-bot">
            <div class="message-content">
              <span class="typing-indicator">
                <span></span><span></span><span></span>
              </span>
            </div>
          </div>
        }
      </div>
      <div class="chat-input">
        <input 
          type="text" 
          [(ngModel)]="inputMessage" 
          placeholder="Type your message..."
          (keyup.enter)="sendMessage()"
          [disabled]="isLoading" />
        <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading || !inputMessage.trim()">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M2 10L18 2L12 18L10 10L2 10Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  }
  <button class="chat-toggle" (click)="toggleChat()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" stroke="currentColor" stroke-width="2" fill="none"/>
    </svg>
  </button>
</div>
