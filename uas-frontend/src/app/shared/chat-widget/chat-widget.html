<div class="chat-widget">
  @if (isOpen) {
    <div class="chat-window">
      <div class="chat-header">
        <h3>AI Financial Assistant</h3>
        <div class="header-actions">
          <button class="clear-btn" (click)="clearHistory()" title="Clear chat history">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M2 4H14M6 4V2C6 1.44772 6.44772 1 7 1H9C9.55228 1 10 1.44772 10 2V4M12.5 4V13C12.5 13.5523 12.0523 14 11.5 14H4.5C3.94772 14 3.5 13.5523 3.5 13V4H12.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button class="close-btn" (click)="toggleChat()">×</button>
        </div>
      </div>
      <div class="chat-messages" #messagesContainer>
        @for (message of messages; track message.timestamp) {
          <div class="message" [ngClass]="'message-' + message.sender">
            <div class="message-content">
              {{ message.text }}
            </div>
            <div class="message-time">
              {{ message.timestamp | date:'shortTime' }}
            </div>
          </div>
        }
        @if (isLoading) {
          <div class="message message-bot">
            <div class="message-content">
              <span class="typing-indicator">
                <span></span><span></span><span></span>
              </span>
            </div>
          </div>
        }
      </div>
      <div class="chat-input">
        <input 
          type="text" 
          [(ngModel)]="inputMessage" 
          placeholder="Type your message..."
          (keyup.enter)="sendMessage()"
          [disabled]="isLoading" />
        <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading || !inputMessage.trim()">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M2 10L18 2L12 18L10 10L2 10Z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </div>
  }
  <button class="chat-toggle" (click)="toggleChat()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2Z" stroke="currentColor" stroke-width="2" fill="none"/>
    </svg>
  </button>
</div>
