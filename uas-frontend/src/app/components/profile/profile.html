<div class="profile">
  <h1>Profile</h1>
  <p class="subtitle">Manage your account information</p>
  
  <div class="profile-card">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Username</label>
        <input type="text" formControlName="username" />
      </div>
      
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" />
      </div>
      
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" />
      </div>
      
      <div class="form-group">
        <label>Profile Picture URL</label>
        <input type="url" formControlName="picture" />
      </div>
      
      <div formGroupName="creditCard" class="section">
        <h3>Credit Card</h3>
        <div class="form-row">
          <div class="form-group">
            <label>Card Number</label>
            <input type="text" formControlName="number" />
          </div>
          <div class="form-group">
            <label>Expiry</label>
            <input type="text" formControlName="expiry" />
          </div>
          <div class="form-group">
            <label>CVV</label>
            <input type="text" formControlName="cvv" maxlength="3" />
          </div>
        </div>
      </div>
      
      <div formGroupName="preferences" class="section">
        <h3>Preferences</h3>
        <div class="form-group">
          <label>Theme</label>
          <select formControlName="theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>
        <div class="form-group">
          <label>
            <input type="checkbox" formControlName="notifications" />
            Email Notifications
          </label>
        </div>
      </div>
      
      @if (successMessage) {
        <div class="success-alert">{{ successMessage }}</div>
      }
      
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
  </div>
</div>
