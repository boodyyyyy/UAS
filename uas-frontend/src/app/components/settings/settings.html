<div class="settings">
  <div class="page-header">
    <h1>System Settings</h1>
    <p class="subtitle">Configure system-wide settings and preferences</p>
  </div>

  <div class="card">
    <h2>General Settings</h2>
    <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
      <div class="form-group">
        <label>System Name</label>
        <input type="text" formControlName="systemName" />
      </div>
      <div class="form-group">
        <label>System Email</label>
        <input type="email" formControlName="systemEmail" />
      </div>
      <div class="form-group">
        <label>Payment Methods</label>
        <textarea formControlName="paymentMethods" rows="3" placeholder="Credit Card, Bank Transfer, Cash"></textarea>
      </div>
      <div class="form-group">
        <label>Payment Terms</label>
        <textarea formControlName="paymentTerms" rows="3" placeholder="Net 30, Net 60, etc."></textarea>
      </div>
      <div class="form-group">
        <label>Budget Categories</label>
        <textarea formControlName="budgetCategories" rows="5" placeholder="Salaries, Equipment, Supplies, etc."></textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Settings</button>
      </div>
    </form>
  </div>
</div>
